services:
  redis:
    image: redis:latest
    container_name: zarjin-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:latest
    container_name: zarjin-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: zarjin_mongodb
    volumes:
      - mongo-data:/data

volumes:
  redis-data:
  mongo-data:
